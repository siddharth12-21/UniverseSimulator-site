<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UniverseSimulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="canvas-container"></div>
  <div id="tooltip"></div>
  <div id="info-panel">
    <div id="info-name"></div>
    <div id="info-facts"></div>
  </div>
  <button id="return-btn">Return to Earth</button>
  <button id="map-btn">Overarching Map</button>
  <div id="map-panel">
    <button id="map-close">&times;</button>
    <div id="map-zoom-label">Solar System</div>
    <canvas id="map-canvas" width="600" height="600"></canvas>
  </div>
  <button id="center-btn">Center</button>
  <div id="brightness-panel">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
    <input id="brightness-slider" type="range" min="0" max="100" value="30" />
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
